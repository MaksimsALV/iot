<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>IoT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <h1 class="mb-4">IoT Control Panel</h1>

    <div class="card mb-4">
        <div class="card-body">
            <h2 class="h5 mb-3">Control</h2>

            <form method="post" action="/actuators">
                <div class="mb-3">
                    <div class="fw-bold">LED</div>
                    <label class="me-3">
                        <input type="radio" name="led" value="on" th:checked="${actuators.ledIsOn}"> On
                    </label>
                    <label>
                        <input type="radio" name="led" value="off" th:checked="${!actuators.ledIsOn}"> Off
                    </label>
                </div>

                <div class="mb-3">
                    <div class="fw-bold">Buzzer (currently does nothing)</div>
                    <label class="me-3">
                        <input type="radio" name="buzzer" value="on" th:checked="${actuators.buzzerIsOn}"> On
                    </label>
                    <label>
                        <input type="radio" name="buzzer" value="off" th:checked="${!actuators.buzzerIsOn}"> Off
                    </label>
                </div>

                <div class="mb-3">
                    <div class="fw-bold">Motor</div>
                    <label class="me-3">
                        <input type="radio" name="motor" value="on" th:checked="${actuators.motorIsOn}"> On
                    </label>
                    <label>
                        <input type="radio" name="motor" value="off" th:checked="${!actuators.motorIsOn}"> Off
                    </label>
                </div>

                <button class="btn btn-primary" type="submit">Save</button>
                <button class="btn btn-outline-secondary" type="button" id="refreshBtn">Refresh</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <h2 class="h5 mb-3">Status</h2>

            <table class="table table-bordered mb-0">
                <tbody>
                <tr><th>LED</th><td id="led" th:text="${actuators.ledIsOn} ? 'ON' : 'OFF'"></td></tr>
                <tr><th>Buzzer</th><td id="buzzer" th:text="${actuators.buzzerIsOn} ? 'ON' : 'OFF'"></td></tr>
                <tr><th>Motor</th><td id="motor" th:text="${actuators.motorIsOn} ? 'ON' : 'OFF'"></td></tr>
                <tr><th>Temperature</th><td id="temperature" th:text="${sensors.temperature}"></td></tr>
                <tr><th>Humidity</th><td id="humidity" th:text="${sensors.humidity}"></td></tr>
                <tr><th>Last motion</th><td id="motion" th:text="${sensors.lastMotionDetectedAt}"></td></tr>
                <tr><th>Last sound</th><td id="sound" th:text="${sensors.lastSoundDetectedAt}"></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
